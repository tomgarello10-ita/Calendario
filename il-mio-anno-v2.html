const CLAUDE_KEY = "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";

async function callClaude(prompt, maxTokens=2000, onChunk=null){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": CLAUDE_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-haiku-4-5-20251001",
      max_tokens: maxTokens,
      stream: onChunk ? true : false,
      messages:[{role:"user", content: prompt}]
    })
  });

  if(!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || "Errore API");
  }

  if(!onChunk) {
    const d = await res.json();
    if(d.error) throw new Error(d.error.message);
    return d.content?.[0]?.text || "";
  }

  // Streaming
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText = "";
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split('\n').filter(l=>l.startsWith('data: '));
    for(const line of lines){
      try{
        const data = JSON.parse(line.slice(6));
        if(data.type === 'content_block_delta' && data.delta?.text){
          fullText += data.delta.text;
          onChunk(fullText);
        }
      }catch{}
    }
  }
  return fullText;
}

// ── METEO ─────────────────────────────────────────────────────────────────────
function useMeteo(){
  const [meteo,setMeteo]=useState(null);
  useEffect(()=>{
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
        const d=await r.json();
        const temp=Math.round(d.current.temperature_2m);
        const code=d.current.weather_code;
        const icon=code<=1?"☀️":code<=3?"⛅":code<=48?"🌫️":code<=67?"🌧️":"⛈️";
        setMeteo({temp,icon});
      }catch{}
    },()=>{},{timeout:5000});
  },[]);
  return meteo;
}

function parseAIContent(text) {
  if(!text) return [{title:"Contenuto", content:"Contenuto non disponibile."}];
  const sections = [];
  const lines = text.split('\n');
  let current = null;

  for(const line of lines) {
    const trimmed = line.trim();
    if(trimmed.startsWith('## ') || trimmed.startsWith('### ') || trimmed.startsWith('# ')) {
      if(current) sections.push(current);
      current = {title: trimmed.replace(/^#+\s+/,''), content:''};
    } else if(!current) {
      current = {title:'Introduzione', content: trimmed + '\n'};
    } else {
      current.content += line + '\n';
    }
  }
  if(current) sections.push(current);
  if(sections.length === 0) sections.push({title:'Contenuto', content: text});

  return sections.map(s => ({
    ...s,
    content: s.content
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/`(.*?)`/g,`<span style="font-family:'JetBrains Mono',monospace;background:#1a1a2e;color:#a8ff78;padding:2px 6px;border-radius:4px;font-size:13px">$1</span>`)
      .trim()
  }));
}

  const onTM=e=>{if(startX.current===null)return;const dx=e.touches[0].clientX-startX.current,dy=Math.abs(e.touches[0].clientY-startY.current);if(!isDragging.current){if(dy>Math.abs(dx)||Math.abs(dx)<8)return;isDragging.current=true;}e.preventDefault();hasMoved.current=Math.abs(dx)>12;currentX.current=dx;setOffset(dx);};
  const onTE=()=>{if(!isDragging.current){startX.current=null;return;}const dx=currentX.current,thr=W.current*0.28;setAnimating(true);if(dx<-thr){setOffset(-W.current);setTimeout(()=>{const n=addMonths(year,month,1);onMonthChange(n.year,n.month);setOffset(0);setAnimating(false);},280);}else if(dx>thr){setOffset(W.current);setTimeout(()=>{const n=addMonths(year,month,-1);onMonthChange(n.year,n.month);setOffset(0);setAnimating(false);},280);}else{setOffset(0);setTimeout(()=>setAnimating(false),280);}startX.current=null;isDragging.current=false;currentX.current=0;};
  const handleDayClick=useCallback((key)=>{if(!hasMoved.current&&!animating)onDay(key);},[animating,onDay]);
  const prev=addMonths(year,month,-1);
  const next=addMonths(year,month,1);
  return (
    <div ref={containerRef} style={{overflow:"hidden",touchAction:"pan-y"}} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
      <div style={{display:"flex",width:"300%",transform:`translateX(calc(-33.333% + ${offset}px))`,transition:animating?"transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94)":"none",willChange:"transform"}}>
        <div style={{width:"33.333%",flexShrink:0}}><MonthGrid year={prev.year} month={prev.month} events={events} alerts={alerts} onDay={handleDayClick}/></div>
        <div style={{width:"33.333%",flexShrink:0}}><MonthGrid year={year} month={month} events={events} alerts={alerts} onDay={handleDayClick}/></div>
        <div style={{width:"33.333%",flexShrink:0}}><MonthGrid year={next.year} month={next.month} events={events} alerts={alerts} onDay={handleDayClick}/></div>
      </div>
    </div>
  );
}

function MonthGrid({year,month,events,alerts,onDay}){
  const {dark}=React.useContext(ThemeCtx);
  const fd=firstDay(year,month),td=daysIn(year,month);
  const getDay=k=>events[k]||[];
  return (
    <div style={{padding:"0 4px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"6px"}}>
        {DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:"10px",fontWeight:"700",color:i>=5?"var(--orange)":"var(--text3)",padding:"4px 0",letterSpacing:"0.05em"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",rowGap:"2px"}}>
        {Array.from({length:fd},(_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:td},(_,i)=>{
          const day=i+1,key=fmt(year,month,day);
          const evs=getDay(key),isT=key===todayStr,isW=(fd+i)%7>=5;
          const isPast=key<todayStr;
          const cats=[...new Set(evs.map(e=>e.category))].slice(0,3);
          const hasAl=alerts.some(a=>a.day===key);
          const diff=daysBetween(key);
          return (
            <div key={key} onClick={()=>onDay(key)} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",borderRadius:"10px",WebkitTapHighlightColor:"transparent",transition:"background 0.15s",background:evs.length>0&&!isT?"rgba(124,111,255,0.06)":"transparent"}}>
              {isT&&<div style={{position:"absolute",inset:"8%",borderRadius:"8px",background:"linear-gradient(135deg,#7c6fff,#ff6b9d)"}}/>}
              {hasAl&&!isT&&<div style={{position:"absolute",inset:"8%",borderRadius:"8px",border:"1.5px solid var(--red)"}}/>}
              <div style={{fontSize:"14px",fontWeight:isT?"700":"500",color:isT?"#fff":isPast?"var(--text3)":isW?"var(--orange)":"var(--text)",position:"relative",zIndex:1,lineHeight:1,marginBottom:cats.length?"3px":"0",fontFamily:isT?"'Sora',sans-serif":"inherit"}}>{day}</div>
              {cats.length>0&&<div style={{display:"flex",gap:"2px",position:"relative",zIndex:1}}>{cats.map(cid=><div key={cid} style={{width:"4px",height:"4px",borderRadius:"50%",background:isT?"rgba(255,255,255,0.8)":getCat(cid).color}}/>)}</div>}
              {!isT&&diff>0&&diff<=5&&evs.some(e=>e.category==="verifica")&&(
                <div style={{position:"absolute",top:"-1px",right:"-1px",background:"var(--red)",borderRadius:"5px",padding:"1px 3px",fontSize:"8px",fontWeight:"700",color:"#fff",zIndex:2,lineHeight:1}}>{diff}g</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

              />
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{setAiText("");setStep("menu");}} className="btn-ghost" style={{flex:1}}>↺ Rigenera</button>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                          </button>
                        )}
                        {(ev.category==="commissione"&&(ev.selectedSugg==="Fare la spesa"||ev.title?.toLowerCase().includes("spesa")))&&(
                          <button onClick={()=>setAiPanel({ev,type:"spesa"})} style={{padding:"6px 12px",borderRadius:"12px",border:"none",background:"rgba(38,222,129,0.15)",color:"var(--green)",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Sora',sans-serif",display:"flex",alignItems:"center",gap:"4px"}}>
                            🛒 Lista spesa AI
                          </button>
                        )}
                        {ev.category==="todo"&&(
                          <button onClick={()=>setAiPanel({ev,type:"todo"})} style={{padding:"6px 12px",borderRadius:"12px",border:"none",background:"rgba(165,94,234,0.15)",color:"var(--purple)",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Sora',sans-serif",display:"flex",alignItems:"center",gap:"4px"}}>
                            ✨ Piano AI
                          </button>
                        )}
                        {ev.category==="appuntamento"&&(
                          <button onClick={()=>setAiPanel({ev,type:"appuntamento"})} style={{padding:"6px 12px",borderRadius:"12px",border:"none",background:"rgba(69,170,242,0.15)",color:"var(--blue)",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Sora',sans-serif",display:"flex",alignItems:"center",gap:"4px"}}>
                            📋 Prepara AI
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>

    {aiPanel?.type==="ripasso"&&<RipassoPanel event={aiPanel.ev} onClose={()=>setAiPanel(null)}/>}
    {aiPanel?.type==="spesa"&&<ListaSpesaPanel event={aiPanel.ev} onClose={()=>setAiPanel(null)}/>}
    {aiPanel?.type==="todo"&&<TodoAIPanel event={aiPanel.ev} onClose={()=>setAiPanel(null)}/>}
    {aiPanel?.type==="appuntamento"&&<AppuntamentoAIPanel event={aiPanel.ev} onClose={()=>setAiPanel(null)}/>}
    </>
  );
}

// ── ALERTS PANEL ──────────────────────────────────────────────────────────────
function AlertsPanel({alerts,onClose,onGo}){
  const [vis,setVis]=useState(false);
  useEffect(()=>{requestAnimationFrame(()=>setVis(true))},[]);
  const close=()=>{setVis(false);setTimeout(onClose,320)};
  const US={urgent:{color:"#ff4d6d",label:"URGENTE"},high:{color:"#ff9f43",label:"IMPORTANTE"},medium:{color:"#ffd32a",label:"ATTENZIONE"},low:{color:"var(--accent)",label:"PROMEMORIA"}};

  return (
    <div onClick={e=>e.target===e.currentTarget&&close()} style={{position:"fixed",inset:0,zIndex:500,background:vis?"rgba(0,0,0,0.6)":"rgba(0,0,0,0)",transition:"background 0.3s",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{background:"var(--bg2)",borderRadius:"24px 24px 0 0",maxHeight:"88vh",display:"flex",flexDirection:"column",transform:vis?"translateY(0)":"translateY(100%)",transition:"transform 0.4s cubic-bezier(0.32,0.72,0,1)",paddingBottom:"env(safe-area-inset-bottom,24px)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:"40px",height:"4px",background:"var(--border)",borderRadius:"2px"}}/></div>
        <div style={{padding:"18px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--border2)"}}>
          <div>
            <div style={{fontSize:"10px",fontWeight:"700",letterSpacing:"0.08em",color:"var(--red)",marginBottom:"4px"}}>🔔 PROMEMORIA</div>
            <div style={{fontSize:"22px",fontWeight:"800",color:"var(--text)"}}>{alerts.length} avvisi</div>
          </div>
          <button onClick={close} style={{background:"var(--bg3)",border:"none",borderRadius:"50%",width:"32px",height:"32px",cursor:"pointer",color:"var(--text2)",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div className="scroll" style={{flex:1,padding:"12px 16px",display:"flex",flexDirection:"column",gap:"8px"}}>
          {alerts.map((a,i)=>{
            const s=US[a.u],[,am,ad]=a.day.split("-");
            const dl=a.d===0?"Oggi":a.d===1?"Domani":`${parseInt(ad)} ${MONTHS_S[parseInt(am)-1]}`;
            return (
              <div key={i} className="tap" onClick={()=>{onGo(a.day);close();}} style={{background:"var(--bg3)",border:`1px solid ${s.color}22`,borderRadius:"16px",padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:"14px"}}>
                <div style={{width:"42px",height:"42px",borderRadius:"12px",background:`${s.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",flexShrink:0}}>{a.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"3px"}}>
                    <span style={{fontSize:"10px",fontWeight:"800",color:s.color,letterSpacing:"0.06em"}}>{s.label}</span>
                    <span style={{fontSize:"11px",color:"var(--text3)"}}>· {dl}</span>
                  </div>
                  <div style={{fontWeight:"700",fontSize:"14px",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.e.title}</div>
                  <div style={{fontSize:"12px",color:"var(--text2)",marginTop:"2px"}}>{a.msg}</div>
                </div>
                <span style={{color:"var(--text3)",fontSize:"18px"}}>›</span>
              </div>
            );
          })}
        </div>
        <div style={{padding:"0 16px 4px"}}>
          <button onClick={close} className="btn-primary" style={{width:"100%"}}>OK, capito!</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [pref,setPref]=useState(loadPref);
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [events,setEvents]=useState(loadEv);
  const [selDay,setSelDay]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [editEv,setEditEv]=useState(null);
  const [view,setView]=useState("month");
  const [fCat,setFCat]=useState(null);
  const [showAl,setShowAl]=useState(false);
  const meteo=useMeteo();
  const dark=pref.dark;

  const toggleDark=()=>{const np={...pref,dark:!dark};setPref(np);savePref(np);};
  useEffect(()=>{document.body.className=dark?"":"light";},[dark]);
  useEffect(()=>{saveEv(events)},[events]);
  useEffect(()=>{const a=getAlerts(events);if(a.length>0)setTimeout(()=>setShowAl(true),800);},[]);

  const alerts=getAlerts(events);
  const getDay=k=>events[k]||[];
  const handleSave=ev=>{setEvents(p=>{const d=p[selDay]||[];if(editEv)return{...p,[selDay]:d.map(e=>e.id===ev.id?ev:e)};return{...p,[selDay]:[...d,ev]};});};
  const delEv=(k,id)=>setEvents(p=>({...p,[k]:(p[k]||[]).filter(e=>e.id!==id)}));

  const totM=useMemo(()=>Object.entries(events).filter(([k])=>k.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).flatMap(([,e])=>e).length,[events,year,month]);
  const allEv=useMemo(()=>Object.entries(events).flatMap(([day,evs])=>evs.map(e=>({...e,day}))).filter(e=>e.day.startsWith(String(year))).filter(e=>!fCat||e.category===fCat).sort((a,b)=>a.day.localeCompare(b.day)),[events,year,fCat]);
  const upcoming=useMemo(()=>Object.entries(events).flatMap(([day,evs])=>evs.map(e=>({...e,day}))).filter(e=>e.day>=todayStr).sort((a,b)=>a.day.localeCompare(b.day)).slice(0,6),[events]);
  const wDays=useMemo(()=>Array.from({length:7},(_,i)=>{const d=new Date(),dow=d.getDay()===0?6:d.getDay()-1,dd=new Date(d);dd.setDate(d.getDate()-dow+i);return dd;}),[]);

  return (
    <ThemeCtx.Provider value={{dark,toggle:toggleDark}}>
    <div style={{fontFamily:"'Sora',sans-serif",background:"var(--bg)",height:"100vh",maxWidth:"430px",margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* HEADER */}
      <div style={{background:dark?"rgba(8,8,15,0.95)":"rgba(247,247,255,0.95)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",paddingTop:"env(safe-area-inset-top,44px)",flexShrink:0,borderBottom:"1px solid var(--border2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 8px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <button className="tap" onClick={()=>{const n=addMonths(year,month,-1);setYear(n.year);setMonth(n.month);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"var(--accent)",padding:"3px 6px",lineHeight:1,fontWeight:"300"}}>‹</button>
            {meteo&&<div style={{display:"flex",alignItems:"center",gap:"4px",padding:"4px 10px",background:"var(--bg3)",borderRadius:"20px"}}>
              <span style={{fontSize:"14px"}}>{meteo.icon}</span>
              <span style={{fontSize:"12px",fontWeight:"700",color:"var(--text2)",fontFamily:"'JetBrains Mono',monospace"}}>{meteo.temp}°</span>
            </div>}
          </div>

          <button onClick={()=>{setYear(today.getFullYear());setMonth(today.getMonth());}} style={{background:"none",border:"none",cursor:"pointer",textAlign:"center",padding:"2px 12px"}}>
            <div style={{fontSize:"18px",fontWeight:"800",color:"var(--text)",letterSpacing:"-0.5px",lineHeight:1}}>{MONTHS[month]}</div>
            <div style={{fontSize:"12px",color:"var(--text3)",fontWeight:"600",fontFamily:"'JetBrains Mono',monospace"}}>{year} · {totM} eventi</div>
          </button>

          <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
            <button className="tap" onClick={toggleDark} style={{background:"var(--bg3)",border:"none",borderRadius:"50%",width:"32px",height:"32px",cursor:"pointer",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>{dark?"☀️":"🌙"}</button>
            <button className="tap" onClick={()=>setShowAl(true)} style={{background:"var(--bg3)",border:`1px solid ${alerts.length>0?"var(--red)22":"transparent"}`,borderRadius:"50%",width:"32px",height:"32px",cursor:"pointer",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px"}}>
              🔔
              {alerts.length>0&&<div className="badge">{alerts.length}</div>}
            </button>
            <button className="tap" onClick={()=>{const n=addMonths(year,month,1);setYear(n.year);setMonth(n.month);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"var(--accent)",padding:"3px 6px",lineHeight:1,fontWeight:"300"}}>›</button>
          </div>
        </div>

        {/* View tabs */}
        <div style={{display:"flex",padding:"0 16px",gap:"4px"}}>
          {[["month","📅 Calendario"],["list","📋 Lista"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"7px 0 9px",border:"none",background:"transparent",fontFamily:"'Sora',sans-serif",fontSize:"13px",fontWeight:view===v?"700":"400",color:view===v?"var(--accent)":"var(--text3)",cursor:"pointer",borderBottom:view===v?"2px solid var(--accent)":"2px solid transparent",transition:"all 0.2s"}}>{l}</button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div className="scroll" style={{flex:1,paddingBottom:"90px"}}>
        {view==="month"&&(
          <div>
            <div style={{padding:"10px 8px 6px"}}>
              <SwipeCalendar year={year} month={month} events={events} alerts={alerts} onDay={setSelDay} onMonthChange={(y,m)=>{setYear(y);setMonth(m);}}/>
            </div>

            {/* Category legend */}
            <div style={{display:"flex",gap:"12px",padding:"6px 16px",overflowX:"auto",flexWrap:"nowrap"}}>
              {CATS.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>
                <div style={{width:"6px",height:"6px",borderRadius:"50%",background:c.color}}/>
                <span style={{fontSize:"11px",color:"var(--text3)",fontWeight:"500",whiteSpace:"nowrap"}}>{c.label}</span>
              </div>)}
            </div>

            {/* Upcoming events */}
            {upcoming.length>0&&(
              <div style={{padding:"8px 12px 0"}}>
                <div style={{fontSize:"11px",fontWeight:"700",color:"var(--text3)",letterSpacing:"0.07em",marginBottom:"8px",paddingLeft:"4px"}}>PROSSIMI EVENTI</div>
                <div style={{background:"var(--bg2)",borderRadius:"18px",overflow:"hidden",border:"1px solid var(--border2)"}}>
                  {upcoming.map((ev,i)=>{
                    const c=getCat(ev.category),d=daysBetween(ev.day),[,em,ed]=ev.day.split("-");
                    return (
                      <div key={`${ev.day}-${ev.id}`} className="tap" onClick={()=>setSelDay(ev.day)}
                        style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer",borderBottom:i<upcoming.length-1?"1px solid var(--border2)":"none"}}>
                        <div style={{width:"36px",height:"36px",borderRadius:"10px",background:c.grad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <div style={{fontSize:"13px",fontWeight:"800",color:"#fff",lineHeight:1}}>{parseInt(ed)}</div>
                          <div style={{fontSize:"8px",color:"rgba(255,255,255,0.8)",fontWeight:"600"}}>{MONTHS_S[parseInt(em)-1]}</div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:"600",fontSize:"14px",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                          <div style={{fontSize:"11px",color:"var(--text2)",marginTop:"2px",display:"flex",alignItems:"center",gap:"6px"}}>
                            {d===0?<span style={{color:c.color,fontWeight:"700"}}>Oggi!</span>:d===1?<span style={{color:"var(--orange)",fontWeight:"700"}}>Domani</span>:<span>{c.label}</span>}
                            {ev.time&&<span>· {ev.time}</span>}
                            {ev.category==="verifica"&&d>0&&d<=7&&<span style={{background:"var(--red)",color:"#fff",borderRadius:"5px",padding:"1px 5px",fontSize:"10px",fontWeight:"700"}}>-{d}g</span>}
                          </div>
                        </div>
                        <span style={{color:"var(--text3)",fontSize:"16px"}}>›</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {upcoming.length===0&&(
              <div style={{textAlign:"center",padding:"32px 0"}}>
                <div style={{fontSize:"40px",marginBottom:"8px"}} className="float">✨</div>
                <div style={{fontSize:"14px",color:"var(--text3)",fontWeight:"500"}}>Nessun evento in programma</div>
                <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"4px",opacity:0.6}}>Tocca un giorno per aggiungerne</div>
              </div>
            )}
          </div>
        )}

        {view==="list"&&(
          <div style={{padding:"12px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
              <button className="tap" onClick={()=>setYear(y=>y-1)} style={{background:"var(--bg3)",border:"none",borderRadius:"10px",padding:"8px 14px",fontSize:"14px",color:"var(--accent)",cursor:"pointer",fontWeight:"700",fontFamily:"'Sora',sans-serif"}}>‹ {year-1}</button>
              <span style={{fontSize:"18px",fontWeight:"800",color:"var(--text)",fontFamily:"'JetBrains Mono',monospace"}}>{year}</span>
              <button className="tap" onClick={()=>setYear(y=>y+1)} style={{background:"var(--bg3)",border:"none",borderRadius:"10px",padding:"8px 14px",fontSize:"14px",color:"var(--accent)",cursor:"pointer",fontWeight:"700",fontFamily:"'Sora',sans-serif"}}>{year+1} ›</button>
            </div>

            <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"6px",marginBottom:"14px"}}>
              <button onClick={()=>setFCat(null)} style={{padding:"6px 14px",borderRadius:"20px",border:`1px solid ${!fCat?"var(--accent)":"var(--border2)"}`,flexShrink:0,background:!fCat?"rgba(124,111,255,0.15)":"var(--bg3)",color:!fCat?"var(--accent)":"var(--text2)",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>Tutti</button>
              {CATS.map(c=><button key={c.id} onClick={()=>setFCat(fCat===c.id?null:c.id)} style={{padding:"6px 12px",borderRadius:"20px",border:`1px solid ${fCat===c.id?c.color:c.color+"30"}`,flexShrink:0,background:fCat===c.id?`${c.color}20`:"transparent",color:c.color,fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>{c.emoji} {c.label}</button>)}
            </div>

            {allEv.length===0?(
              <div style={{textAlign:"center",padding:"50px 0"}}>
                <div style={{fontSize:"42px",marginBottom:"10px"}} className="float">📋</div>
                <div style={{color:"var(--text2)",fontSize:"15px",fontWeight:"600"}}>Nessun evento</div>
              </div>
            ):(
              <div style={{background:"var(--bg2)",borderRadius:"18px",overflow:"hidden",border:"1px solid var(--border2)"}}>

                  const c=getCat(ev.category),[,em,ed]=ev.day.split("-"),d=daysBetween(ev.day);

                      <div style={{width:"36px",height:"36px",borderRadius:"10px",background:c.grad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <div style={{fontSize:"13px",fontWeight:"800",color:"#fff",lineHeight:1}}>{parseInt(ed)}</div>
                        <div style={{fontSize:"8px",color:"rgba(255,255,255,0.8)",fontWeight:"600"}}>{MONTHS_S[parseInt(em)-1]}</div>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:"600",fontSize:"14px",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                        <div style={{fontSize:"11px",color:"var(--text2)",marginTop:"2px",display:"flex",alignItems:"center",gap:"5px"}}>
                          <span style={{color:c.color,fontWeight:"600"}}>{c.label}</span>
                          {ev.time&&<span>· {ev.time}</span>}
                          {ev.category==="verifica"&&d>0&&d<=7&&<span style={{background:"var(--red)",color:"#fff",borderRadius:"5px",padding:"1px 5px",fontSize:"10px",fontWeight:"700"}}>-{d}g</span>}
                        </div>
                      </div>
                      <button onClick={()=>delEv(ev.day,ev.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:"22px",padding:"4px"}}>×</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* BOTTOM WEEK BAR */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:dark?"rgba(8,8,15,0.97)":"rgba(247,247,255,0.97)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid var(--border2)",padding:"8px 10px env(safe-area-inset-bottom,18px)",zIndex:150}}>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          {wDays.map((d,i)=>{
            const key=fmt(d.getFullYear(),d.getMonth(),d.getDate()),evs=getDay(key),isT=key===todayStr,hasAl=alerts.some(a=>a.day===key);
            return (
              <div key={i} className="tap" onClick={()=>setSelDay(key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"3px 1px",cursor:"pointer",position:"relative"}}>
                {hasAl&&!isT&&<div style={{position:"absolute",top:"0",right:"4px",width:"5px",height:"5px",borderRadius:"50%",background:"var(--red)"}}/>}
                <div style={{fontSize:"10px",fontWeight:"700",color:isT?"var(--accent)":"var(--text3)",marginBottom:"4px",letterSpacing:"0.04em"}}>{DAYS[i]}</div>
                <div style={{width:"32px",height:"32px",borderRadius:"10px",background:isT?"linear-gradient(135deg,var(--accent),var(--accent2))":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
                  <div style={{fontSize:"15px",fontWeight:isT?"800":"500",color:isT?"#fff":i>=5?"var(--orange)":"var(--text)"}}>{d.getDate()}</div>
                </div>
                <div style={{display:"flex",gap:"2px",marginTop:"3px",height:"4px",alignItems:"center"}}>
                  {evs.slice(0,3).map((ev,j)=><div key={j} style={{width:"4px",height:"4px",borderRadius:"50%",background:isT?"rgba(255,255,255,0.7)":getCat(ev.category).color}}/>)}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {showAl&&<AlertsPanel alerts={alerts} onClose={()=>setShowAl(false)} onGo={day=>{setSelDay(day);setMonth(parseInt(day.split("-")[1])-1);setYear(parseInt(day.split("-")[0]));setView("month");}}/>}
      {selDay&&!showModal&&!showAl&&<DaySheet dayKey={selDay} events={getDay(selDay)} onAdd={()=>{setEditEv(null);setShowModal(true)}} onEdit={ev=>{setEditEv(ev);setShowModal(true)}} onDel={id=>delEv(selDay,id)} onClose={()=>setSelDay(null)}/>}
      {showModal&&selDay&&<Modal dayKey={selDay} onClose={()=>setShowModal(false)} onSave={handleSave} editEvent={editEv}/>}
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
